<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Phạm Hồng Phúc</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            line-height: 1.6;
        }

        header{
            background-color: #0d6efd;
            padding: 15px;
            text-align: center;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover{
            text-decoration: underline;
        }

        main{
            width: 80%;
            margin: 20px auto;
        }

        section{
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom: 15px;
            color: #0d6efd;
        }

        figure{
            text-align: center;
        }

        img{
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid #0d6efd;
        }

        figcaption{
            margin-top: 10px;
            font-weight: bold;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td{
            border: 1px solid #ddd;
        }

        th{
            background-color: #0d6efd;
            color: white;
            padding: 10px;
        }

        td{
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even){
            background-color: #f8f9fa;
        }

        #contact{
            margin-left: 70px;
        }
        aside{
            width: 80%;
            margin: 5px auto;
            background: white;
            padding: 10px;
            border-left: 4px solid #0d6efd;
        }

        footer{
            background-color: #212529;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="#home" id="home">Home</a>
            <a href="#profile">Profile</a>
            <a href="#skills">Skills</a>
        </nav>
    </header>
    <main>
        <section id="profile">
            <h2>Profile</h2>
            <article>
                <figure>
                    <img src="images/profile.jpg" alt=""/>
                    <figcaption>Phạm Hồng Phúc</figcaption>
                </figure>
            </article>
        </section>
        <section id="skills">
            <h2>Skills</h2>
            <table>
                <thead>
                    <tr>
                        <th>Kỹ năng</th>
                        <th>Mức độ</th>
                        <th>Ghi chú</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>HTML</td>
                        <td>3</td>
                        <td>Đang học</td>
                    </tr>
                    <tr>
                        <td>CSS</td>
                        <td>3</td>
                        <td>Đang học</td>
                    </tr>
                    <tr>
                        <td>Boostrap</td>
                        <td>2</td>
                        <td>Đang học</td>
                    </tr>
                    <tr>
                        <td>React</td>
                        <td>2</td>
                        <td>Đang học</td>
                    </tr>
                    <tr>
                        <td>Javascript</td>
                        <td>2</td>
                        <td>Đang học</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <h2 id="contact">Liên hệ:</h2>
        <aside>PhoneNumber: 0852215507</aside>
        <aside>Email: 2251172454@e.tlu.edu.vn</aside>
    <footer>
        <p>@Copyright 2026</p>
    </footer>
</body>
</html>
